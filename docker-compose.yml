services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: foundry_db
      POSTGRES_USER: foundry
      POSTGRES_PASSWORD: foundry123
    ports:
      - "5432:5432"
    volumes:
      - ./db_setup.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundry -d foundry_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/foundry_db
      SPRING_DATASOURCE_USERNAME: foundry
      SPRING_DATASOURCE_PASSWORD: foundry123
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://backend:8080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

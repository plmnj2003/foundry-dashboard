services:
  db:
    # pgvector 확장이 포함된 이미지 필요 (일반 postgres:16 이미지에는 vector.control이 없음)
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: foundry_db
      POSTGRES_USER: foundry
      POSTGRES_PASSWORD: foundry123
    ports:
      - "5432:5432"
    volumes:
      - ./db_setup.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundry -d foundry_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/foundry_db
      SPRING_DATASOURCE_USERNAME: foundry
      SPRING_DATASOURCE_PASSWORD: foundry123
      RAG_SERVICE_URL: http://rag-service:8081
    depends_on:
      db:
        condition: service_healthy
      rag-service:
        condition: service_started

  rag-service:
    build: ./rag-service
    ports:
      - "8081:8081"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: foundry_db
      PGUSER: foundry
      PGPASSWORD: foundry123
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://backend:8080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
